<section class="hero hero--overlay" {% if include.image %}style="background-image: url('{{ include.image | relative_url }}')"{% endif %}>
  <div class="hero__content">
    <p class="hero__eyebrow">Sparrow Neuropsychology · Vancouver</p>
    <h1 class="hero__title">{{ include.title }}</h1>
    {% if include.subtitle %}
      <p class="hero__subtitle">{{ include.subtitle }}</p>
    {% endif %}
    {% if include.cta %}
      <a href="{{ site.data.contact.booking_url }}" target="_blank" rel="noopener" class="btn btn--primary">Book a free 15-minute consultation</a>
    {% endif %}
  </div>
</section>
