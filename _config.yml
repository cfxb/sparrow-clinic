title: Sparrow Neuropsychology
description: >-
  Adult neuropsychological assessment in Vancouver, BC — memory, attention,
  and thinking — by Dr. Christopher Benjamin, clinical neuropsychologist.
url: "https://www.sparrow.clinic"
baseurl: ""

markdown: kramdown
permalink: /:title/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - audit
  - CLAUDE.md

defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: /assets/images/og-default.jpg

sass:
  sass_dir: _sass
  style: compressed
